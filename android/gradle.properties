org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
android.useAndroidX=true

# Enable optimization and caching
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.incremental=true

# R8/ProGuard configuration
android.enableR8=true
android.enableMinification=true
kotlin.incremental=true
kotlin.incremental.useIsolatedIC=true
