name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - beta
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'true'
        type: boolean

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # 4. Get dependencies
      - name: Get dependencies
        run: flutter pub get

      # 5. Run tests
      - name: Run tests
        run: flutter test
        continue-on-error: true

      # 6. Build based on release type
      - name: Build ${{ inputs.release_type }} APK
        run: |
          if [ "${{ inputs.release_type }}" == "debug" ]; then
            flutter build apk --debug --split-per-abi
          else
            flutter build apk --release --split-per-abi
            flutter build appbundle --release
          fi

      # 7. Update version in pubspec.yaml
      - name: Update version
        if: inputs.create_release == 'true'
        run: |
          sed -i "s/version: .*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml

      # 8. Upload artifacts
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: visuales-uclv-${{ inputs.release_type }}-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload App Bundle
        if: inputs.release_type != 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: visuales-uclv-app-bundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # 9. Create GitHub Release
      - name: Create GitHub Release
        if: inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Visuales UCLV v${{ inputs.version }}
          body: |
            ## 🎉 Visuales UCLV v${{ inputs.version }}
            
            ### 📱 Información del Build
            - **Build Number**: ${{ github.run_number }}
            - **Tipo**: ${{ inputs.release_type }}
            - **Fecha**: ${{ github.event.head_commit.timestamp }}
            
            ### ✨ Características
            - 🔍 Búsqueda avanzada de contenido
            - 📁 Navegación por categorías
            - 📥 Gestor de descargas
            - 💾 Cache local
            - 🌙 Modo oscuro
            - ⚡ Funcionamiento offline
            
            ### 📦 Descargas
            | Archivo | Tamaño | Descarga |
            |---------|--------|----------|
            | APK (ARMv7) | ~50MB | [Descargar](https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/app-armeabi-v7a-release.apk) |
            | APK (ARM64) | ~55MB | [Descargar](https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/app-arm64-v8a-release.apk) |
            | App Bundle | ~60MB | [Descargar](https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/app-release.aab) |
            
            ### 📝 Notas de la versión
            - Primera versión estable
            - Soporte para Android 5.0+
            - Optimizado para el servidor Visuales UCLV
            
            ---
            **⚠️ Disclaimer**: Esta es una app no oficial para el servidor Visuales UCLV.
          draft: false
          prerelease: ${{ inputs.release_type == 'beta' }}
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Build summary
      - name: Generate Build Summary
        run: |
          echo "## 📱 Manual Release Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ inputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Type | ${{ inputs.release_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Create Release | ${{ inputs.create_release }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ APK files in \`build/app/outputs/flutter-apk/\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.release_type }}" != "debug" ]; then
            echo "- ✅ App Bundle in \`build/app/outputs/bundle/release/\`" >> $GITHUB_STEP_SUMMARY
          fi
