name: Android Build CI (Enterprise)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  MAX_APK_SIZE_MB: 50

jobs:
  # ============================================
  # JOB 1: Análisis de Calidad de Código
  # ============================================
  quality-check:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify format
        run: dart format --set-exit-if-changed .

      - name: Analyze code (strict)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run all tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # ============================================
  # JOB 2: Build Matrix (Parallel)
  # ============================================
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality-check

    strategy:
      matrix:
        build-type: [debug, release]
        architecture: [arm64-v8a, armeabi-v7a]
        exclude:
          - build-type: debug
            architecture: armeabi-v7a

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          if [ "${{ matrix.build-type }}" == "debug" ]; then
            flutter build apk --debug --verbose
          else
            flutter build apk --release --target-platform android-${{ matrix.architecture }} --verbose
          fi

      - name: Get APK info
        id: apk_info
        run: |
          if [ "${{ matrix.build-type }}" == "debug" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          
          APK_SIZE=$(ls -lh $APK_PATH | awk '{print $5}')
          APK_SIZE_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null || echo "0")
          APK_SIZE_MB=$((APK_SIZE_BYTES / 1048576))
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "apk_size_mb=$APK_SIZE_MB" >> $GITHUB_OUTPUT

      - name: Check APK Size
        run: |
          if [ ${{ steps.apk_info.outputs.apk_size_mb }} -gt ${{ env.MAX_APK_SIZE_MB }} ]; then
            echo "❌ APK size (${{ steps.apk_info.outputs.apk_size_mb }}MB) exceeds limit (${{ env.MAX_APK_SIZE_MB }}MB)"
            exit 1
          fi
          echo "✅ APK size: ${{ steps.apk_info.outputs.apk_size }} (${{ steps.apk_info.outputs.apk_size_mb }}MB)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.build-type }}-${{ matrix.architecture }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # JOB 3: Build App Bundle (Play Store)
  # ============================================
  build-bundle:
    name: 📦 Build App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release --verbose

      - name: Get AAB info
        id: aab_info
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          AAB_SIZE=$(ls -lh $AAB_PATH | awk '{print $5}')
          AAB_SIZE_BYTES=$(stat -c%s "$AAB_PATH" 2>/dev/null || stat -f%z "$AAB_PATH" 2>/dev/null || echo "0")
          AAB_SIZE_MB=$((AAB_SIZE_BYTES / 1048576))
          
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "aab_size=$AAB_SIZE" >> $GITHUB_OUTPUT
          echo "aab_size_mb=$AAB_SIZE_MB" >> $GITHUB_OUTPUT

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: ${{ steps.aab_info.outputs.aab_path }}
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # JOB 4: GitHub Release Automático
  # ============================================
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, build-bundle]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/version: .*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, using full changelog"
            CHANGELOG=$(sed -n '/## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | sed '1d;$d')
          else
            echo "Previous tag: $LAST_TAG"
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" $LAST_TAG..HEAD)
          fi
          
          # Escape special characters for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}
          name: Release v${{ steps.version.outputs.version }} (${{ github.run_number }})
          body: |
            ## 🚀 Cambios en esta versión

            ${{ steps.changelog.outputs.changelog }}

            ## 📦 Builds Disponibles

            | Build | Tamaño | Arquitectura |
            |-------|--------|--------------|
            | Debug | $(ls -lh artifacts/apk-debug-arm64-v8a/*.apk 2>/dev/null | awk '{print $5}' || echo "N/A") | arm64-v8a |
            | Release | $(ls -lh artifacts/apk-release-arm64-v8a/*.apk 2>/dev/null | awk '{print $5}' || echo "N/A") | arm64-v8a |
            | App Bundle | $(ls -lh artifacts/app-bundle/*.aab 2>/dev/null | awk '{print $5}' || echo "N/A") | Universal |

            ---
            **Build Number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Fecha:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # JOB 5: Notificaciones
  # ============================================
  notify:
    name: 🔔 Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, release]
    if: always()

    steps:
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        with:
          args: |
            🚀 **Visuales UCLV - Build #${{ github.run_number }}**
            
            **Versión:** v${{ steps.version.outputs.version }}
            **Estado:** ${{ needs.build.result == 'success' && '✅ Éxito' || '❌ Falló' }}
            **Release:** ${{ needs.release.result == 'success' && 'Publicado' || 'No publicado' }}
            
            Ver cambios: https://github.com/${{ github.repository }}/releases
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        if: ${{ env.DISCORD_WEBHOOK != '' }}

      - name: Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 *Visuales UCLV - Build #${{ github.run_number }}*

            *Versión:* v${{ steps.version.outputs.version }}
            *Estado:* ${{ needs.build.result == 'success' && '✅ Éxito' || '❌ Falló' }}
            *Release:* ${{ needs.release.result == 'success' && 'Publicado' || 'No publicado' }}

            [Ver cambios](https://github.com/${{ github.repository }}/releases)
          format: markdown
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}

  # ============================================
  # JOB 6: Generar Resumen
  # ============================================
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality-check, build, build-bundle, release]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 📱 Visuales UCLV - Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Check | ${{ needs.quality-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build APK | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App Bundle | ${{ needs.build-bundle.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Notifications | ${{ needs.notify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
