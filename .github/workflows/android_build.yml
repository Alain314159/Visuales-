name: Android Build CI (Strict)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify format
        run: dart format --set-exit-if-changed .

      - name: Analyze code (strict)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run all tests
        run: flutter test --coverage

      - name: Build Release APK (optimized)
        run: flutter build apk --release --split-per-abi --verbose --dart-define=FLUTTER_BUILD_MODE=release

      - name: Build App Bundle (optimized)
        run: flutter build appbundle --release --verbose --dart-define=FLUTTER_BUILD_MODE=release

      - name: Compress Release APK
        run: |
          ls -lh build/app/outputs/flutter-apk/
          zip -q -9 build/app/outputs/flutter-apk/app-armeabi-v7a-release-optimized.apk build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk || true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: Generate Build Report
        if: always()
        run: |
          APK_SIZE=$(ls -lh build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk | awk '{print $5}')
          BUNDLE_SIZE=$(ls -lh build/app/outputs/bundle/release/app-release.aab | awk '{print $5}')
          echo "## 📱 Android Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size | $BUNDLE_SIZE |" >> $GITHUB_STEP_SUMMARY
