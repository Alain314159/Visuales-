name: visuales_uclv
description: Buscador y gestor de descargas para Visuales UCLV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado - lightweight and efficient
  provider: ^6.1.1

  # HTTP y Descargas - optimized with connection pooling
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Persistencia - minimal overhead
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Utilidades
  url_launcher: ^6.2.1
  permission_handler: ^12.0.1

  # UI Components - Material Design built-in
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
