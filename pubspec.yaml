name: visuales_uclv
description: Buscador y gestor de descargas para Visuales UCLV
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado - lightweight and efficient
  provider: ^6.1.1

  # HTTP y Descargas - optimized with connection pooling
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Persistencia - Hive (10x más rápido que SharedPreferences)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Logging estructurado
  logger: ^2.0.2+1

  # Firebase (Crashlytics, Analytics)
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.4.0

  # Utilidades
  url_launcher: ^6.2.1
  permission_handler: ^11.1.0

  # UI Components - Material Design built-in
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
