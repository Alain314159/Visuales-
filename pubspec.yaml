name: visuales_uclv
description: Buscador y gestor de descargas para Visuales UCLV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  provider: ^6.1.1

  # HTTP y Descargas
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Persistencia
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Utilidades
  url_launcher: ^6.2.1
  permission_handler: ^11.1.0

  # UI Components
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
  
  # fonts:
